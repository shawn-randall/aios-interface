<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>AIOS</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    #header {
      padding: 12px 16px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #fff;
    }

    #clear-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      background: #1a6cf6;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #1e1e1e;
      color: #f0f0f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.assistant p { margin: 0 0 8px; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant strong { color: #fff; }
    .message.assistant ul, .message.assistant ol { padding-left: 18px; margin: 4px 0 8px; }
    .message.assistant li { margin-bottom: 2px; }
    .message.assistant h1, .message.assistant h2, .message.assistant h3 {
      font-size: 15px; font-weight: 600; margin: 8px 0 4px; color: #fff;
    }
    .message.assistant code {
      background: #2a2a2a; padding: 1px 5px; border-radius: 4px; font-size: 13px;
    }
    .message.assistant hr { border: none; border-top: 1px solid #333; margin: 8px 0; }

    .message.thinking {
      background: #1e1e1e;
      color: #666;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      font-style: italic;
    }

    #input-area {
      padding: 12px 16px;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: #0f0f0f;
    }

    #input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 10px 16px;
      color: #f0f0f0;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      outline: none;
    }

    #input::placeholder { color: #555; }

    #input:focus { border-color: #444; }

    #send-btn {
      background: #1a6cf6;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send-btn:disabled { background: #333; cursor: default; }

    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    #mic-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    #mic-btn svg { width: 18px; height: 18px; fill: #aaa; }
    #mic-btn.listening { background: #b3261e; border-color: #b3261e; animation: pulse 1.2s infinite; }
    #mic-btn.listening svg { fill: #fff; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

    #voice-toggle {
      background: none;
      border: 1px solid #333;
      color: #888;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 8px;
    }
    #voice-toggle.on { color: #1a6cf6; border-color: #1a6cf6; }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #444;
      font-size: 14px;
      text-align: center;
      padding: 32px;
    }

    #empty-state .logo { font-size: 28px; font-weight: 700; color: #333; letter-spacing: 0.1em; }
  </style>
</head>
<body>

<div id="header">
  <h1>AIOS</h1>
  <div style="display:flex; align-items:center;">
    <button id="voice-toggle" onclick="toggleVoice()">🔇 Voice</button>
    <button id="clear-btn" onclick="clearChat()">Clear</button>
  </div>
</div>

<div id="messages">
  <div id="empty-state">
    <div class="logo">AIOS</div>
    <div>What do you need?</div>
  </div>
</div>

<div id="input-area">
  <button id="mic-btn" onclick="toggleMic()" title="Tap to speak">
    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
  </button>
  <textarea id="input" placeholder="Ask anything..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  // Point this at your Vercel deployment URL after deploying
  const API_URL = "/api/v2";

  let history = [];

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send-btn");
  const micBtn     = document.getElementById("mic-btn");
  const voiceToggle = document.getElementById("voice-toggle");

  // ── Voice output (text-to-speech) ──────────────────────────────────────────
  let voiceOn = localStorage.getItem("aios_voice") === "on";
  function renderVoiceToggle() {
    voiceToggle.textContent = voiceOn ? "🔊 Voice" : "🔇 Voice";
    voiceToggle.classList.toggle("on", voiceOn);
  }
  renderVoiceToggle();
  function toggleVoice() {
    voiceOn = !voiceOn;
    localStorage.setItem("aios_voice", voiceOn ? "on" : "off");
    renderVoiceToggle();
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      if (voiceOn) {
        // iOS unlock: speaking inside this tap gesture enables TTS for later async replies
        const u = new SpeechSynthesisUtterance("Voice on");
        u.rate = 1.0;
        window.speechSynthesis.speak(u);
      }
    }
  }
  function speak(text) {
    if (!voiceOn || !window.speechSynthesis) return;
    // Strip markdown so it reads cleanly
    const clean = text
      .replace(/[#*_`>~\-]/g, " ")
      .replace(/\[(.*?)\]\(.*?\)/g, "$1")
      .replace(/\s+/g, " ")
      .trim();
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(clean);
    u.rate = 1.0; u.pitch = 1.0;
    window.speechSynthesis.speak(u);
  }

  // ── Voice input (speech-to-text) ───────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null, listening = false;
  if (SR) {
    recognition = new SR();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      inputEl.value = transcript;
      stopMic();
      sendMessage();
    };
    recognition.onerror = () => stopMic();
    recognition.onend = () => stopMic();
  } else {
    // No speech recognition (e.g. iOS Safari) — hide mic, point to keyboard dictation
    micBtn.style.display = "none";
  }
  function toggleMic() {
    if (!recognition) return;
    listening ? stopMic() : startMic();
  }
  function startMic() {
    try { recognition.start(); listening = true; micBtn.classList.add("listening"); } catch (_) {}
  }
  function stopMic() {
    listening = false; micBtn.classList.remove("listening");
    try { recognition.stop(); } catch (_) {}
  }

  // Auto-reload after 30 min of inactivity — ensures fresh code + fresh context
  const INACTIVITY_MS = 30 * 60 * 1000;
  let inactivityTimer = setTimeout(() => location.reload(), INACTIVITY_MS);
  function resetInactivityTimer() {
    clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(() => location.reload(), INACTIVITY_MS);
  }
  document.addEventListener("touchstart", resetInactivityTimer);
  document.addEventListener("keydown", resetInactivityTimer);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  function clearEmptyState() {
    const empty = document.getElementById("empty-state");
    if (empty) empty.remove();
  }

  function addMessage(role, text) {
    clearEmptyState();
    const div = document.createElement("div");
    div.className = `message ${role}`;
    if (role === "assistant") {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    addMessage("user", text);
    const thinking = addMessage("thinking", "thinking...");

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history }),
      });

      const data = await res.json();
      thinking.remove();

      if (data.reply) {
        let display = data.reply;
        if (data.saved && data.saved.length > 0) display += "\n\n↑ Saved to GitHub";
        if (data.toolsCalled && data.toolsCalled.length > 0) {
          display += `\n\n_tools: ${data.toolsCalled.join(", ")}_`;
        } else if (data.toolsCalled && data.toolsCalled.length === 0) {
          display += "\n\n_tools: none called_";
        }
        addMessage("assistant", display);
        speak(data.reply);
        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: data.reply });
        if (history.length > 20) history = history.slice(-20);
      } else {
        addMessage("assistant", "Something went wrong. Try again.");
      }
    } catch (err) {
      thinking.remove();
      addMessage("assistant", "Connection error. Check your network.");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = `
      <div id="empty-state">
        <div class="logo">AIOS</div>
        <div>What do you need?</div>
      </div>`;
  }
</script>

</body>
</html>
