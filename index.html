<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>AIOS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    #header {
      padding: 12px 16px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #fff;
    }

    #clear-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      background: #1a6cf6;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #1e1e1e;
      color: #f0f0f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.thinking {
      background: #1e1e1e;
      color: #666;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      font-style: italic;
    }

    #input-area {
      padding: 12px 16px;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: #0f0f0f;
    }

    #input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 10px 16px;
      color: #f0f0f0;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      outline: none;
    }

    #input::placeholder { color: #555; }

    #input:focus { border-color: #444; }

    #send-btn {
      background: #1a6cf6;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send-btn:disabled { background: #333; cursor: default; }

    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #444;
      font-size: 14px;
      text-align: center;
      padding: 32px;
    }

    #empty-state .logo { font-size: 28px; font-weight: 700; color: #333; letter-spacing: 0.1em; }
  </style>
</head>
<body>

<div id="header">
  <h1>AIOS</h1>
  <button id="clear-btn" onclick="clearChat()">Clear</button>
</div>

<div id="messages">
  <div id="empty-state">
    <div class="logo">AIOS</div>
    <div>What do you need?</div>
  </div>
</div>

<div id="input-area">
  <textarea id="input" placeholder="Ask anything..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  // Point this at your Vercel deployment URL after deploying
  const API_URL = "/api/chat";

  let history = [];

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send-btn");

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  function clearEmptyState() {
    const empty = document.getElementById("empty-state");
    if (empty) empty.remove();
  }

  function addMessage(role, text) {
    clearEmptyState();
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    addMessage("user", text);
    const thinking = addMessage("thinking", "thinking...");

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history }),
      });

      const data = await res.json();
      thinking.remove();

      if (data.reply) {
        addMessage("assistant", data.reply);
        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: data.reply });
        // Keep history to last 10 turns to control token cost
        if (history.length > 20) history = history.slice(-20);
      } else {
        addMessage("assistant", "Something went wrong. Try again.");
      }
    } catch (err) {
      thinking.remove();
      addMessage("assistant", "Connection error. Check your network.");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = `
      <div id="empty-state">
        <div class="logo">AIOS</div>
        <div>What do you need?</div>
      </div>`;
  }
</script>

</body>
</html>
